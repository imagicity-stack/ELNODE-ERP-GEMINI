name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - storage.rules

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore & Storage rules
        run: npx firebase-tools deploy --only firestore:rules,storage --project el-node-erp --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
